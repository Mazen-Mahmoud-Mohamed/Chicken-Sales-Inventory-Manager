<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://*:* ws://*:*">
  <title>الرئيسية — مدير مبيعات الدجاج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/dashboard.css">
</head>
<body>
  <div class="app-container">
    <nav class="navbar" id="navbar"></nav>

    <!-- Top Section -->
    <section class="card">
      <div class="top-section">
        <div class="form-group">
          <label class="form-label" for="currentDate">التاريخ</label>
          <input type="date" id="currentDate" class="form-input">
        </div>
        <div class="top-section-actions">
          <button type="button" id="inventoryBtn" class="btn btn-primary">مخزون اليوم</button>
          <button type="button" id="categoriesBtn" class="btn btn-secondary">إدارة الفئات</button>
          <a href="records.html" class="btn btn-secondary">السجلات</a>
          <a href="reports.html" class="btn btn-secondary">التقارير</a>
        </div>
      </div>
      <div id="inventoryAlert" class="inventory-alert hidden"></div>
    </section>

    <!-- Category Prices -->
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">أسعار الفئات (جنيه / كجم)</h2>
      </div>
      <div class="category-prices-grid" id="categoryPricesGrid"></div>
    </section>

    <!-- Sale Form -->
    <section class="card sale-form-section">
      <div class="card-header">
        <h2 class="card-title">عملية بيع جديدة</h2>
      </div>
      <div class="sale-form-grid">
        <div class="form-group">
          <label class="form-label" for="categorySelect">الفئة</label>
          <select id="categorySelect" class="form-input"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="weightInput">الوزن (كجم)</label>
          <input type="number" id="weightInput" class="form-input" min="0.01" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group hidden" id="chickenCountGroup">
          <label class="form-label" for="chickenCountInput">عدد الفراخ</label>
          <input type="number" id="chickenCountInput" class="form-input" min="1" step="1" placeholder="0">
        </div>
        <div class="calculated-price-display">
          <div class="calculated-price-label">السعر المحسوب</div>
          <div class="calculated-price-value" id="calculatedPrice">0.00</div>
        </div>
        <div class="sale-actions">
          <button type="button" id="saveBtn" class="btn btn-primary btn-lg">حفظ</button>
          <button type="button" id="savePrintBtn" class="btn btn-accent btn-lg">حفظ وطباعة</button>
        </div>
      </div>
    </section>

    <!-- Dashboard Stats -->
    <section class="dashboard-stats">
      <div class="summary-cards">
        <div class="stat-card">
          <div class="stat-card-label">إجمالي المبيعات</div>
          <div class="stat-card-value" id="statTotalSales">0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">عدد الفراخ المتبقي</div>
          <div class="stat-card-value" id="statRemainingChickens">0</div>
        </div>
      </div>
      <h3 class="section-subtitle">المخزون المتبقي حسب الفئة</h3>
      <div class="stats-grid" id="categoryInventoryGrid"></div>
    </section>
  </div>

  <!-- Inventory Modal -->
  <div class="modal-overlay hidden" id="inventoryModal">
    <div class="modal modal-lg">
      <h3 class="modal-title">مخزون اليوم</h3>
      <form id="inventoryForm">
        <div class="form-group mb-2">
          <label class="form-label">التاريخ</label>
          <input type="date" id="inventoryDate" class="form-input" readonly>
        </div>
        <div class="form-group mb-2">
          <label class="form-label" for="inventoryChickenCount">عدد الفراخ (فراخ كاملة)</label>
          <input type="number" id="inventoryChickenCount" class="form-input" min="0" step="1" required>
        </div>
        <div id="inventoryItemsGrid" class="inventory-items-grid"></div>
        <div class="modal-actions">
          <button type="button" id="cancelInventoryBtn" class="btn btn-secondary">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ المخزون</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Categories Modal -->
  <div class="modal-overlay hidden" id="categoriesModal">
    <div class="modal modal-lg">
      <h3 class="modal-title">إدارة الفئات</h3>
      <div class="toolbar mb-2">
        <input type="text" id="newCategoryName" class="form-input" placeholder="اسم الفئة الجديدة">
        <input type="number" id="newCategoryPrice" class="form-input" min="0" step="0.01" placeholder="السعر">
        <button type="button" id="addCategoryBtn" class="btn btn-primary">إضافة</button>
      </div>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>الفئة</th>
              <th>سعر الكيلو</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="categoriesTableBody"></tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button type="button" id="closeCategoriesBtn" class="btn btn-secondary">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/sync.js"></script>
  <script type="module" src="js/components/navbar.js"></script>
  <script type="module" src="js/services/printService.js"></script>
  <script type="module" src="js/pages/dashboard.js"></script>
</body>
</html>
