<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://*:* ws://*:*">
  <title>السجلات — مدير مبيعات الدجاج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/records.css">
</head>
<body>
  <div class="app-container">
    <nav class="navbar" id="navbar"></nav>

    <div class="page-header">
      <div>
        <h1 class="page-title">سجلات المبيعات</h1>
        <p class="page-subtitle">عرض وبحث وتعديل وإدارة جميع المبيعات</p>
      </div>
      <a href="index.html" class="btn btn-secondary">العودة للرئيسية</a>
    </div>

    <section class="card">
      <div class="filters-bar">
        <div class="filter-group toolbar-search">
          <label for="searchInput">بحث</label>
          <input type="text" id="searchInput" class="form-input" placeholder="بحث بالفئة أو الوزن أو السعر...">
        </div>
        <div class="filter-group">
          <label for="dateFrom">من تاريخ</label>
          <input type="date" id="dateFrom" class="form-input">
        </div>
        <div class="filter-group">
          <label for="dateTo">إلى تاريخ</label>
          <input type="date" id="dateTo" class="form-input">
        </div>
        <button type="button" id="filterBtn" class="btn btn-primary">تصفية</button>
        <button type="button" id="clearFilterBtn" class="btn btn-secondary">مسح</button>
      </div>

      <div class="records-summary" id="recordsSummary"></div>

      <div class="toolbar">
        <button type="button" id="exportExcelBtn" class="btn btn-secondary">تصدير Excel</button>
        <button type="button" id="printRecordsBtn" class="btn btn-secondary">طباعة السجلات</button>
      </div>

      <div class="table-container">
        <table class="data-table" id="recordsTable">
          <thead>
            <tr>
              <th>التاريخ</th>
              <th>الوقت</th>
              <th>الفئة</th>
              <th>الوزن (كجم)</th>
              <th>سعر الكيلو</th>
              <th>السعر الإجمالي</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr>
              <td colspan="7" class="text-center text-muted">جاري تحميل السجلات...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay hidden" id="editModal">
    <div class="modal">
      <h3 class="modal-title">تعديل عملية البيع</h3>
      <form id="editForm">
        <input type="hidden" id="editSaleId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="editWeight">الوزن (كجم)</label>
            <input type="number" id="editWeight" class="form-input" min="0.01" step="0.01" required>
          </div>
          <div class="form-group" id="editChickenCountGroup">
            <label class="form-label" for="editChickenCount">عدد الفراخ</label>
            <input type="number" id="editChickenCount" class="form-input" min="1" step="1">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelEditBtn" class="btn btn-secondary">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ التعديلات</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay hidden" id="deleteModal">
    <div class="modal">
      <h3 class="modal-title">حذف عملية البيع</h3>
      <p>هل أنت متأكد من حذف هذه العملية؟ لا يمكن التراجع عن هذا الإجراء.</p>
      <div class="modal-actions">
        <button type="button" id="cancelDeleteBtn" class="btn btn-secondary">إلغاء</button>
        <button type="button" id="confirmDeleteBtn" class="btn btn-danger">حذف</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/sync.js"></script>
  <script type="module" src="js/components/navbar.js"></script>
  <script type="module" src="js/pages/records.js"></script>
</body>
</html>
